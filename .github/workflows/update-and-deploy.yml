name: Update data & deploy

# Runs the data pipeline monthly, commits the refreshed dataset, and publishes
# the dashboard to GitHub Pages. Also runs on every push to main and on demand.
on:
  schedule:
    # Every 6 hours — keeps the news board fresh (the data series update at most
    # daily/monthly at the source; the news feed is the intraday-moving piece).
    - cron: "0 */6 * * *"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # to commit the refreshed data back to the repo
  pages: write      # to deploy to GitHub Pages
  id-token: write   # required by deploy-pages

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Build the data files from live sources (falls back to sample data for any
      # source not yet wired up). Housing/price/company revenue are keyless; the
      # Canadian exports source needs the free UN Comtrade key exposed here.
      - name: Build dataset
        run: node pipeline/build-data.mjs --live
        env:
          COMTRADE_KEY: ${{ secrets.COMTRADE_KEY }}

      # Optional: keep a git history of the data. This must NOT block the deploy —
      # the site publishes the freshly-built files regardless of whether this
      # commit-back succeeds, so any git hiccup here is downgraded to a warning.
      - name: Commit refreshed data (optional)
        continue-on-error: true
        run: |
          git config user.name "lumber-dashboard-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/dataset.js data/dataset.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "chore: automated data refresh [skip ci]"
          git pull --rebase origin main || true
          git push origin HEAD:main \
            || echo "::warning::data commit-back skipped (push failed); the site still deploys from this build"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - id: deployment
        uses: actions/deploy-pages@v4
